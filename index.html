      <script type="module">
      import { playhtml } from "https://unpkg.com/playhtml@latest";
      
    const musicPlayer = document.getElementById("music-player");
musicPlayer.defaultData = {
  startedAt: Date.now() - musicPlayer.currentTime * 1000,
};

const DRIFT_THRESHOLD = 0.25; // seconds, only correct if off by more than this

musicPlayer.updateElement = ({ element, data }) => {
  element.muted = true;
  element.volume = 0.2;

  if (!data || typeof data.startedAt !== "number" || !isFinite(data.startedAt)) {
    return;
  }

  const expected = (Date.now() - data.startedAt) / 1000;
  if (!isFinite(expected) || expected < 0) {
    return;
  }

  if (element.readyState < 1) {
    element.addEventListener("loadedmetadata", () => {
      if (isFinite(expected)) element.currentTime = expected;
    }, { once: true });
    return;
  }

  const drift = Math.abs(element.currentTime - expected);
  if (drift > DRIFT_THRESHOLD) {
    element.currentTime = expected;
  }

  if (element.paused) {
    element.play().catch(() => {});
  }
};
        document.addEventListener('click', () => {
  musicPlayer.muted = false;
}, { once: true });

musicPlayer.onMount = ({ setData, requestUpdate }) => {
  // Only set the reference once — don't keep resetting it every second.
  // If you want periodic re-sync in case of clock skew, do it rarely
  // and only correct big drift (handled above), e.g. every 10-15s:
  const resync = setInterval(() => {
    requestUpdate(); // just re-runs updateElement with existing data, checks drift
  }, 5000);

  return () => clearInterval(resync);
};
        
const captures = {};

function createUser(id){
  if (document.getElementById(id)) return;
  const el = document.createElement("div");
  el.setAttribute("can-mirror", "")
el.id = id;
//
document.getElementById('sketch-holder').appendChild(el);
new p5((p) => newCapture(p, id));
playhtml.setupPlayElement(el, { ignoreIfAlreadySetup: true });
}

function newCapture(p , id) {
  p.setup = function () {
  const canvas = p.createCanvas(100, 100);
    const capture = p.createCapture(p.VIDEO, { flipped: true });
    capture.size(100,100);
    capture.hide();               // hide the raw video, only show the canvas
    canvas.parent(document.getElementById(id));
    captures[id] = capture;       // draw(
  };
  p.draw = function () {
    p.image(captures[id], 0, 0, 100);
  }
}

         document.addEventListener('keydown', (event) => {
    const el = document.getElementById(playhtml.presence.getMyIdentity().publicKey); 
      if ((event.key === 'c' || event.key === 'C') && isHoveringBar) {
    const newCup = document.createElement("img");
    newCup.classList.add("cup");
    newCup.src = "images/cup.png";
    el.appendChild(newCup);
  }
  if (event.key == 's' || event.key == 'S'){
  console.log(el.id);
  if (el.classList.contains('spin-once')) return; 

  el.classList.add('spin-once');
  }
});

let isHoveringBar = false;

document.addEventListener('mousemove', (event) => {
  const bar = document.getElementById("bar");
  const rect = bar.getBoundingClientRect();

  const withinX = event.clientX > rect.left - 100 && event.clientX < rect.right + 100;
  const withinY = event.clientY > rect.top - 100 && event.clientY < rect.bottom + 100;

  isHoveringBar = withinX && withinY;

  document.getElementById("cupText").style.display = isHoveringBar ? "block" : "none";
});

        
document.addEventListener('animationend', (event) => {
  if (event.animationName === 'spin-once') {
    event.target.classList.remove('spin-once');
  }
});
